name: Build LandVe KSU Next Main

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by Youffx
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Youffx/4.19-rosemary-kernel
          ref: ksun-kprobes
          fetch-depth: 1

      - name: Linux Cip-129
        run: |
          git branch
          git log --oneline -n 5

      - name: KSU Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy_susfs

      - name: Apply SUSFS and Fix Rejects
        run: |
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/syscall_hook_patches.sh" | bash
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.19.patch" | patch -p1 || true
          
          sed -i '1i #include <linux/susfs.h>' kernel/sys.c
          if [ -f kernel/sys.c.rej ]; then
            sed -i '/case PR_SET_PDEATHSIG:/i #ifdef CONFIG_KSU_SUSFS\n	if (option == PR_SUSFS_RUN_COMMAND) {\n		return susfs_run_command((void __user *)arg2, (uint32_t)arg3);\n	}\n#endif' kernel/sys.c
          fi

          sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c
          if [ -f fs/proc/task_mmu.c.rej ]; then
            sed -i 's|if (vma->vm_file) {|if (vma->vm_file) {\n#ifdef CONFIG_KSU_SUSFS\n		struct path path = vma->vm_file->f_path;\n		susfs_sus_map(vma->vm_file, \&path);\n#endif|' fs/proc/task_mmu.c
          fi
          
          rm -f kernel/sys.c.rej fs/proc/task_mmu.c.rej
          sed -i '1s/^/extern void susfs_set_i_state_on_external_dir(void *);\n/' drivers/kernelsu/supercalls.c

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev

      - name: Setup Clang ZyCromerZ
        run: |
          mkdir -p ${{ github.workspace }}/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf Clang-15.0.7-20260208.tar.gz -C ${{ github.workspace }}/clang
          rm Clang-15.0.7-20260208.tar.gz
          ${{ github.workspace }}/clang/bin/clang --version

      - name: Modifikasi Defconfig
        run: |
          DEFCONFIG="arch/arm64/configs/rosemary_defconfig"

          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBE_EVENTS/d' $DEFCONFIG
          sed -i '/CONFIG_KSU_KPROBE_HOOKS/d' $DEFCONFIG
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          sed -i '/CONFIG_EROFS_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SDCARD_FS/d' $DEFCONFIG
          sed -i '/CONFIG_KSU_/d' $DEFCONFIG
          
          {

            echo "CONFIG_KPROBES=n"
            echo "CONFIG_KPROBE_EVENTS=n"
            echo "CONFIG_KSU_KPROBE_HOOKS=n"
            echo "CONFIG_EROFS_FS=y"
            echo "CONFIG_EROFS_FS_ZIP=y"
            echo "CONFIG_EROFS_FS_POSIX_ACL=y"
            echo "CONFIG_EROFS_FS_SECURITY=y"
            echo "CONFIG_SDCARD_FS=y"
            echo 'CONFIG_LOCALVERSION="-LandVe👺/Tengusama"'
            echo "CONFIG_LOCALVERSION_AUTO=n"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_DEBUG=n"
            echo "CONFIG_KSU_ALLOWLIST_WORKAROUND=n"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=n"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=n"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Youffx"
          export KBUILD_BUILD_HOST="Builder"
          export KBUILD_LSB_VERSION=n
          MAKE_FLAGS=(
              ARCH=arm64
              CROSS_COMPILE=aarch64-linux-gnu-
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-
              CC=clang
              LD=ld.lld
              AR=llvm-ar
              NM=llvm-nm
              OBJCOPY=llvm-objcopy
              OBJDUMP=llvm-objdump
              STRIP=llvm-strip
              CLANG_TRIPLE=aarch64-linux-gnu-
              KBUILD_BUILD_VERSION=1
          )
          
          make O=out "${MAKE_FLAGS[@]}" rosemary_defconfig
          make -j$(nproc --all) O=out "${MAKE_FLAGS[@]}"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: LandVe-Image-RKSU
          path: out/arch/arm64/boot/Image.gz-dtb
