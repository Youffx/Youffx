name: Package Flashable Zip

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  package:
    name: Prepare Flashable Zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find Latest Workflow Run
        id: find_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_RUN_ID=""
          LATEST_TIME=""
          LATEST_WF=""
          
          WORKFLOWS=("LandVe-KSUN-Fork.yml" "LandVe-KSUN-Official.yml" "LandVe-RKSU.yml")
          
          for WF in "${WORKFLOWS[@]}"; do
            RUN_INFO=$(gh run list --workflow "$WF" --status success --limit 1 --json databaseId,createdAt -q '.[0]')
            if [[ "$RUN_INFO" != "null" && -n "$RUN_INFO" ]]; then
              RUN_ID=$(echo "$RUN_INFO" | jq -r '.databaseId')
              RUN_TIME=$(echo "$RUN_INFO" | jq -r '.createdAt')
              
              if [[ -z "$LATEST_TIME" ]] || [[ "$RUN_TIME" > "$LATEST_TIME" ]]; then
                LATEST_TIME="$RUN_TIME"
                LATEST_RUN_ID="$RUN_ID"
                LATEST_WF="$WF"
              fi
            fi
          done
          
          if [[ -z "$LATEST_RUN_ID" ]]; then
            echo "No successful runs found."
            exit 1
          fi
          
          echo "LATEST_RUN_ID=$LATEST_RUN_ID" >> $GITHUB_ENV
          echo "LATEST_WF=$LATEST_WF" >> $GITHUB_ENV

      - name: Download Latest Kernel Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ env.LATEST_RUN_ID }}
          path: kernel_temp

      - name: Generate Dynamic Release Notes
        run: |
          BUILD_WF=".github/workflows/${LATEST_WF}"
          
          SUFFIX=$(echo "$LATEST_WF" | sed 's/LandVe-//;s/.yml//')
          DESC="### LandVe Kernel Release ($SUFFIX)\n\n"
          
          DESC+="**Workflow Steps Applied:**\n"
          STEPS=$(grep "\- name:" "$BUILD_WF" | grep -vE "Checkout|Install Dependencies|Setup Clang|Build Kernel|Upload Image" | sed 's/- name: //g' | xargs -I {} echo "- ✅ {}")
          DESC+="$STEPS\n\n"
          
          DESC+="**Kernel Configuration (Defconfig Mod):**\n"
          CONFIGS=$(grep -oP "CONFIG_[A-Z0-9_]+" "$BUILD_WF" | grep -v "LOCALVERSION" | sort -u | xargs -I {} echo "- \`{}\`")
          DESC+="$CONFIGS\n\n"

          COMPILER=$(grep "wget" "$BUILD_WF" | cut -d'/' -f 8 | sed 's/Clang-//;s/.tar.gz//' | head -n 1)
          DESC+="**Toolchain:** \`$COMPILER\`\n"

          LOCAL_VER=$(grep -m 1 "echo 'CONFIG_LOCALVERSION=" "$BUILD_WF" | cut -d'"' -f2 | sed 's/^-//' | sed 's/\///g')
          DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="${LOCAL_VER}-${SUFFIX}-${DATE}"
          
          mkdir -p output
          
          IMAGE_PATH=$(find kernel_temp -name "Image.gz-dtb" | head -n 1)
          if [[ -z "$IMAGE_PATH" ]]; then
            echo "Image.gz-dtb not found!"
            exit 1
          fi
          
          cp "$IMAGE_PATH" .github/Flash/kernels/
          cd .github/Flash/
          zip -r "../../output/${ZIP_NAME}.zip" ./*
          cd ../../

          echo "ZIP_FINAL_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "RELEASE_TAG=Release-${SUFFIX}-${DATE}" >> $GITHUB_ENV
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo -e "$DESC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.ZIP_FINAL_NAME }}
          body: ${{ env.RELEASE_NOTES }}
          files: output/${{ env.ZIP_FINAL_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
