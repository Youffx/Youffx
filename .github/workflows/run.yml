      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf \
            libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev jq

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.ref }}-${{ github.sha }}

      - uses: actions/cache@v4
        with:
          path: clang
          key: Clang-15.0.7

      - name: Load Config
        id: cfg
        run: |
          CONFIG=$(jq -c ".[$CONFIG_INDEX]" configs/builds.json)
          NAME=$(echo "$CONFIG" | jq -r '.name')
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
        env:
          CONFIG_INDEX: ${{ github.event.inputs.config_index }}

      - name: Clone Kernel
        run: |
          REPO=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.repo')
          BRANCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.branch')
          DEPTH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.fetchDepth')

          git clone --depth=$DEPTH --branch $BRANCH $REPO kernel

      - name: Setup Clang
        run: |
          if [ ! -d "clang/bin" ]; then
            mkdir clang
            curl -L https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz | tar -xz -C clang
          fi
          echo "$PWD/clang/bin" >> $GITHUB_PATH

      - name: Setup ccache
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -z

      - name: Build Kernel (NONKSU)
        run: |
          DEFCONFIG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '."nonksu-defconfig"')

          export ARCH=arm64
          export PATH="$PWD/clang/bin:$PATH"
          export CC="ccache clang"

          cd kernel
          make O=out $DEFCONFIG

          LV="-LandVe-nonksu${{ github.event.inputs.localversion }}"
          echo "CONFIG_LOCALVERSION=\"$LV\"" >> out/.config

          make O=out olddefconfig
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC="ccache clang" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            Image.gz-dtb

      - name: Package
        run: |
          DATE=$(date +"%Y%m%d-%H%M")
          NAME="${{ steps.cfg.outputs.name }}"
          ZIP="NONKSU-${NAME}-${DATE}.zip"

          mkdir outzip
          cp kernel/out/arch/arm64/boot/Image.gz-dtb outzip/

          cd outzip
          zip -r "../$ZIP" ./*
          cd ..

          echo "ZIP=$ZIP" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: zip-nonksu
          path: "*.zip"

# =========================
# RELEASE
# =========================
  release:
    needs: [build-ksu, build-nonksu]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Collect ZIPs
        run: |
          mkdir final
          find . -name "*.zip" -exec cp {} final/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Release-${{ github.run_id }}
          name: LandVe Kernel Release
          files: final/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
