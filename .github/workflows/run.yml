      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-nonksu
          path: output/*.zip

      - name: Show ccache statistics
        run: ccache -s

# =========================
# RELEASE
# =========================
  release:
    name: Release
    needs: [build-ksu, build-nonksu]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Collect ZIPs
        run: |
          mkdir final
          find . -name "*.zip" -exec cp {} final/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Release-${{ github.run_id }}
          name: LandVe Kernel Release
          body: |
            ### LandVe Kernel Release

            **Build Details:**
            - Config index: ${{ github.event.inputs.config_index }}
            - LocalVersion: ${{ github.event.inputs.localversion }}

            **Includes:**
            - KSU Kernel
            - NON-KSU Kernel
          files: final/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          tg() {
            curl -sX POST https://api.telegram.org/bot"${TOKEN}"/sendMessage \
              -d chat_id="${CHATID}" \
              -d parse_mode=Markdown \
              -d disable_web_page_preview=true \
              -d text="$1"
          }

          cd kernel
          KERN_VER=$(make kernelversion)
          COMMIT_LOG=$(git log -1 --format='%h %s')
          COMPILER_VER=$($GITHUB_WORKSPACE/clang/bin/clang --version | head -n 1 | cut -d'(' -f1)
          DEVICE_NAME=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.name')
          CORE_COUNT=$(nproc --all)
          BUILD_DATE=$(date +"%a %b %d %H:%M:%S %Z %Y")

          MESSAGE="*LandVe CI Build Triggered*
          *Docker OS:* Ubuntu
          *Kernel Version:* $KERN_VER
          *Date:* $BUILD_DATE
          *Device:* $DEVICE_NAME
          *Host Core Count:* $CORE_COUNT
          *Compiler Used:* $COMPILER_VER
          *Build Status:*
          KernelSU Variant: Included
          Non-KSU Variant: Included
          *Top Commit:* $COMMIT_LOG"

          tg "$MESSAGE"
          
