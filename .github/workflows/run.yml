name: NON LTO

on:
  workflow_dispatch:
    inputs:
      config_index:
        description: "Select (0,1,2,3,4)"
        required: true
        default: "0"
      localversion:
        description: "Youffx 2026"
        required: false
        default: ""

permissions:
  contents: write
  actions: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:

# =========================
# BUILD KSU
# =========================
  build-ksu:
    name: Build KSU
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex git gnupg gperf \
            libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev jq

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-ksu-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('configs/builds.json') }}
          restore-keys: |
            ccache-ksu-${{ runner.os }}-${{ github.ref }}-
            ccache-ksu-${{ runner.os }}-
            ccache-ksu-

      - name: Restore Clang
        uses: actions/cache@v4
        with:
          path: clang
          key: Clang-15.0.7

      - name: Load Config
        id: cfg
        run: |
          CONFIG=$(jq -c ".[$CONFIG_INDEX]" configs/builds.json)
          NAME=$(echo "$CONFIG" | jq -r '.name')
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
        env:
          CONFIG_INDEX: ${{ github.event.inputs.config_index }}

      - name: Clone Kernel
        run: |
          REPO=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.repo')
          BRANCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.branch')
          DEPTH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.fetchDepth')

          git clone --depth=$DEPTH --branch $BRANCH $REPO kernel

      - name: Setup Clang
        run: |
          if [ ! -d "clang/bin" ]; then
            mkdir clang
            curl -L https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz | tar -xz -C clang
          fi
          echo "$PWD/clang/bin" >> $GITHUB_PATH

      - name: Setup ccache
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -z

      - name: Apply Root Method (KSU)
        run: |
          ROOT_TYPE=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.type')

          if [ "$ROOT_TYPE" != "none" ]; then
            SETUP=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.setup')
            ARG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.arg')
            PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.manualPatch')
            EXTRA_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.extraPatch // empty')
            SUSFS_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.susfsPatch // empty')
            i_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iPatch // empty')
            ii_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iiPatch // empty')
            iii_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iiiPatch // empty')
            iv_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.ivPatch // empty')
            v_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.vPatch // empty')

            cd kernel

            curl -LSs "$SETUP" | bash -s $ARG

            [ "$PATCH" != "null" ] && curl -LSs "$PATCH" | patch -p1 || true
            [ -n "$EXTRA_PATCH" ] && curl -LSs "$EXTRA_PATCH" | patch -p1 || true
            [ -n "$SUSFS_PATCH" ] && curl -LSs "$SUSFS_PATCH" | patch -p1 || true
            [ -n "$i_PATCH" ] && curl -LSs "$i_PATCH" | patch -p1 || true
            [ -n "$ii_PATCH" ] && curl -LSs "$ii_PATCH" | patch -p1 || true
            [ -n "$iii_PATCH" ] && curl -LSs "$iii_PATCH" | patch -p1 || true
            [ -n "$iv_PATCH" ] && curl -LSs "$iv_PATCH" | patch -p1 || true
            [ -n "$v_PATCH" ] && curl -LSs "$v_PATCH" | patch -p1 || true

            cd ..
          fi

      - name: Build Kernel (KSU)
        run: |
          DEFCONFIG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '."ksu-defconfig"')

          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$PWD/clang/bin:$PATH"
          export KBUILD_BUILD_USER="youffx"
          export KBUILD_BUILD_HOST="collection"
          export KBUILD_BUILD_VERSION=1
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          export CC="ccache clang"
          export CXX="ccache clang++"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_MAXSIZE=10G

          ccache -s

          cd kernel

          make O=out $DEFCONFIG

          LV_INPUT="${{ github.event.inputs.localversion }}"
          BASE="-LandVe"

          if [ -n "$LV_INPUT" ]; then
            LV="${BASE}${LV_INPUT}"
          else
            LV="$BASE"
          fi

          LV_ESCAPED=$(printf '%s\n' "$LV" | sed 's/[&#]/\\&/g')

          if grep -q "^CONFIG_LOCALVERSION=" out/.config; then
            sed -i "s#^CONFIG_LOCALVERSION=.*#CONFIG_LOCALVERSION=\"$LV_ESCAPED\"#" out/.config
          else
            echo "CONFIG_LOCALVERSION=\"$LV\"" >> out/.config
          fi

          make O=out olddefconfig

          echo "===== LANDVE DEBUGS ====="
          grep -E "CPU_FREQ_UNDERCLOCK_LIMIT|SSG|CASS|TEO" out/.config

          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC="ccache clang" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            Image.gz-dtb

      - name: Package Flashable Zip (KSU)
        run: |
          DATE=$(date +"%Y%m%d-%H%M")
          CONF_NAME="${{ steps.cfg.outputs.name }}"
          ZIP_NAME="LandVe-Kernel-${CONF_NAME}-KSU-${DATE}"

          IMAGE="kernel/out/arch/arm64/boot/Image.gz-dtb"
          mkdir -p output
          cp "$IMAGE" .github/Flash/kernels/

          cd .github/Flash/
          zip -r "../../output/${ZIP_NAME}.zip" ./*
          cd ../../

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-ksu
          path: output/*.zip

      - name: Show ccache statistics
        run: ccache -s

# =========================
# BUILD NONKSU
# =========================
