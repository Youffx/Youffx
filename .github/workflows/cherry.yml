name: Cherry Pick & Revert

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch (e.g. dev OR commitSHA newBranch)"
        required: true
      source:
        description: "Source repo (format: user/repo)"
        required: false
      commits:
        description: "Cherry-pick commit IDs (space separated, optional)"
        required: false
      revert_commits:
        description: "Revert commit IDs (space separated, optional)"
        required: false
      exclude_files:
        description: "Files to exclude (space separated, optional)"
        required: false

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Restore Repo Cache
        uses: actions/cache@v4
        with:
          path: repo
          key: repo-${{ github.event.inputs.branch }}

      - name: Prepare Repository
        run: |
          INPUT="${{ github.event.inputs.branch }}"
          REPO_URL="https://github.com/Youffx/kernel_xiaomi_rosemary.git"

          PARTS=($INPUT)

          if [ ${#PARTS[@]} -eq 2 ]; then
            TARGET="${PARTS[0]}"
            CUSTOM_BRANCH="${PARTS[1]}"
          else
            TARGET="$INPUT"
            CUSTOM_BRANCH=""
          fi

          echo "TARGET=$TARGET"
          echo "CUSTOM_BRANCH=$CUSTOM_BRANCH"

          if [ -d "repo/.git" ]; then
            echo "Using cached repository..."
            cd repo
            git remote set-url origin $REPO_URL
            git fetch origin --prune
          else
            echo "Cloning fresh repository..."
            git clone $REPO_URL repo
            cd repo
          fi

          git fetch origin --tags

          if git ls-remote --heads origin "$TARGET" | grep -q "refs/heads/$TARGET"; then
            git checkout -B "$TARGET" "origin/$TARGET"
            git pull origin "$TARGET" --rebase || true
            echo "WORK_BRANCH=$TARGET" >> $GITHUB_ENV
          else
            git fetch origin "$TARGET" || true

            if [ -n "$CUSTOM_BRANCH" ]; then
              NEW_BRANCH="$CUSTOM_BRANCH"
            else
              NEW_BRANCH="cherry-pick-${TARGET:0:7}"
            fi

            git checkout -b "$NEW_BRANCH" "$TARGET"
            echo "WORK_BRANCH=$NEW_BRANCH" >> $GITHUB_ENV
          fi

      - name: Add Source Repository
        if: ${{ github.event.inputs.source != '' }}
        run: |
          cd repo
          git remote remove source || true
          git remote add source https://github.com/${{ github.event.inputs.source }}.git
          git fetch source

      - name: Configure Git + Import GPG
        run: |
          git config --global user.name "${{ secrets.USER }}"
          git config --global user.email "${{ secrets.EMAIL }}"

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "default-cache-ttl 36000" >> ~/.gnupg/gpg-agent.conf
          echo "max-cache-ttl 36000" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

          echo "${{ secrets.GPG_PRIVATE_KEY }}" > private.key
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --import private.key
          rm -f private.key

          gpgconf --kill gpg-agent
          gpg-connect-agent reloadagent /bye

          echo "test" | gpg --clearsign --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" > /dev/null

          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
          git config --global gpg.program gpg

      - name: Revert Commits
        if: ${{ github.event.inputs.revert_commits != '' }}
        run: |
          cd repo

          for commit in ${{ github.event.inputs.revert_commits }}
          do
            echo "Reverting $commit"

            git revert --no-commit $commit || true

            if [ -n "${{ github.event.inputs.exclude_files }}" ]; then
              for file in ${{ github.event.inputs.exclude_files }}
              do
                git checkout HEAD -- "$file" || true
              done
            fi

            git add .
            git commit --no-edit -C $commit || true
          done

      - name: Cherry Pick Commits
        if: ${{ github.event.inputs.commits != '' }}
        run: |
          cd repo

          CONFLICT_COUNT=0
          CONFLICT_FILES=""

          for commit in ${{ github.event.inputs.commits }}
          do
            echo "Cherry-picking $commit"

            git cherry-pick -n $commit || true

            CONFLICTED=$(git diff --name-only --diff-filter=U)

            if [ -n "$CONFLICTED" ]; then
              echo "Conflict detected in:"
              echo "$CONFLICTED"

              CONFLICT_COUNT=$((CONFLICT_COUNT + 1))
              CONFLICT_FILES="$CONFLICT_FILES Commit $commit: $CONFLICTED"
            fi

            if [ -n "${{ github.event.inputs.exclude_files }}" ]; then
              for file in ${{ github.event.inputs.exclude_files }}
              do
                git checkout HEAD -- "$file" || true
              done
            fi

            AUTHOR=$(git log -1 --pretty='%an <%ae>' $commit)

            COMMIT_MSG=$(git log -1 --pretty=%B $commit)

            if echo "$COMMIT_MSG" | grep -q "Signed-off-by:"; then
              COMMIT_MSG="$COMMIT_MSG"$'\n'"Signed-off-by: Youffx <asa.jazal@gmail.com>"
            fi

            git add -A
            echo "$COMMIT_MSG" | git commit -F - || true
          done

          echo "CONFLICT_COUNT=$CONFLICT_COUNT" >> $GITHUB_ENV
          echo "CONFLICT_FILES<<EOF" >> $GITHUB_ENV
          echo -e "$CONFLICT_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Push to Repository
        if: success()
        env:
          PAT_TOKEN: ${{ secrets.REPO_A_PAT }}
        run: |
          cd repo
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/Youffx/kernel_xiaomi_rosemary.git
          git push origin $WORK_BRANCH

      - name: Notification
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          tg() {
            curl -sX POST https://api.telegram.org/bot"${TOKEN}"/sendMessage \
              -d chat_id="${CHATID}" \
              -d parse_mode=Markdown \
              -d disable_web_page_preview=true \
              -d text="$1"
          }

          BUILD_DATE=$(date +"%a %b %d %H:%M:%S %Z %Y")

          if [ "${{ env.CONFLICT_COUNT }}" -gt 0 ]; then
            STATUS="⚠️ *Cherry-pick finished with conflicts*"
            CONFLICT_INFO="*Conflicted files:*\n\`\`\`\n${{ env.CONFLICT_FILES }}\n\`\`\`"
          else
            STATUS="✅ *Cherry-pick success (no conflicts)*"
            CONFLICT_INFO=""
          fi

          MESSAGE="*Cherry Pick Report*
          $STATUS

          *Date:* \`$BUILD_DATE\`

          $CONFLICT_INFO

          Repo: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          tg "$MESSAGE"

      - name: Save Repo Cache
        uses: actions/cache@v4
        with:
          path: repo
          key: repo-${{ github.event.inputs.branch }}
          
