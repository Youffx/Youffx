name: Advanced Kernel Builder

on:
  workflow_dispatch:
    inputs:
      config_index:
        description: "Select (zero,n,ns,r,rs)"
        required: true
        default: "0"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev jq

      - name: Load Config
        id: cfg
        run: |
          CONFIG=$(jq -c ".[$CONFIG_INDEX]" configs/builds.json)
          NAME=$(echo "$CONFIG" | jq -r '.name')
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
        env:
          CONFIG_INDEX: ${{ github.event.inputs.config_index }}

      - name: Clone Kernel
        run: |
          REPO=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.repo')
          BRANCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.branch')
          DEPTH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.fetchDepth')

          git clone --depth=$DEPTH --branch $BRANCH $REPO kernel

      - name: Setup Clang
        run: |
          mkdir clang
          curl -L https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz | tar -xz -C clang
          echo "$PWD/clang/bin" >> $GITHUB_PATH

      - name: Apply Root Method
        run: |
          ROOT_TYPE=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.type')

          if [ "$ROOT_TYPE" != "none" ]; then
            SETUP=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.setup')
            ARG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.arg')
            PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.manualPatch')
            EXTRA_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.extraPatch // empty')

            cd kernel
            curl -LSs "$SETUP" | bash -s $ARG
            if [ "$PATCH" != "null" ]; then
              curl -LSs "$PATCH" | patch -p1
            fi
            if [ -n "$EXTRA_PATCH" ] && [ "$EXTRA_PATCH" != "null" ]; then
              curl -LSs "$EXTRA_PATCH" | git apply
            fi
            cd ..
          fi

      - name: Build Kernel
        run: |
          DEFCONFIG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.defconfig')

          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$PWD/clang/bin:$PATH"

          cd kernel

          make O=out $DEFCONFIG

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Package Flashable Zip
        run: |
          DATE=$(date +"%Y%m%d-%H%M")
          CONF_NAME="${{ steps.cfg.outputs.name }}"
          ZIP_NAME="LandVe-Kernel-${CONF_NAME}-${DATE}"
          
          IMAGE="kernel/out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE" ]; then
            echo "Kernel image not found!"
            exit 1
          fi

          mkdir -p output
          cp "$IMAGE" .github/Flash/kernels/
          cd .github/Flash/
          zip -r "../../output/${ZIP_NAME}.zip" ./*
          cd ../../

          echo "ZIP_FINAL_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "RELEASE_TAG=Release-${CONF_NAME}-${DATE}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.ZIP_FINAL_NAME }}
          body: |
            ### LandVe Kernel Release
            
            **Build Details:**
            - **Variant:** `${{ steps.cfg.outputs.name }}`
            - **SusFS:** `${{ fromJson(steps.cfg.outputs.config).susfs }}`
          files: output/${{ env.ZIP_FINAL_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
