          echo "compiler=$($GITHUB_WORKSPACE/llvm/bin/clang --version | head -n 1 | cut -d'(' -f1)" >> $GITHUB_OUTPUT

      - name: Telegram Fail Report
        if: failure()
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/build-nonksu.log" ]; then
            ERROR_MSG="but there ain’t no logs tho.."
          else
            ERROR_MSG=$(grep -iE "error:|fatal:|make\[.*\]: \*\*\*" "$GITHUB_WORKSPACE/build-nonksu.log" | tail -20)
          fi

          TEXT=$(cat <<EOF
          yoo build NONKSU flopped
          $ERROR_MSG
          EOF
          )

          curl -sX POST https://api.telegram.org/bot$TOKEN/sendMessage \
            -d chat_id="$CHATID" \
            --data-urlencode text="$TEXT"
  
  release:
    name: Release
    needs: [build-ksu, build-nonksu]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Collect ZIPs
        run: |
          mkdir final
          find . -name "*.zip" -exec cp {} final/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Release-${{ github.run_id }}
          name: LandVe Kernel Release
          body: |
            ### LandVe Kernel Release

            **Build Details:**
            - Version: ${{ github.event.inputs.localversion }}+

            **Includes:**
            - KSU Kernel
            - NON-KSU Kernel
          files: final/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          tg() {
            curl -sX POST https://api.telegram.org/bot"${TOKEN}"/sendMessage \
              -d chat_id="${CHATID}" \
              -d parse_mode=Markdown \
              -d disable_web_page_preview=true \
              -d text="$1"
          }

          BUILD_DATE=$(date +"%a %b %d %H:%M:%S %Z %Y")

          MESSAGE="*LandVe Kernel CI Release*
          *Kernel Version:* \`${{ needs.build-ksu.outputs.kern_ver }}\`
          *Compiler:* \`${{ needs.build-ksu.outputs.compiler_ver }}\`
          *Date:* \`$BUILD_DATE\`
          *Build Variants:* \`KSU, Non-KSU\`
          *Latest Commit:* \`${{ needs.build-ksu.outputs.commit_log }}\`
          *Build Statistics:*
          • *KSU:* *${{ needs.build-ksu.outputs.build_time }}* | *sha256:* \`${{ needs.build-ksu.outputs.zip_hash }}\`
          • *Non-KSU:* *${{ needs.build-nonksu.outputs.build_time }}* | *sha256:* \`${{ needs.build-nonksu.outputs.zip_hash }}\`

          [Check Release](https://github.com/${{ github.repository }}/releases/tag/Release-${{ github.run_id }})"

          tg "$MESSAGE"
          
