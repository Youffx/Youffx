            Image.gz-dtb 2>&1 | tee $GITHUB_WORKSPACE/build-nonksu.log

      - name: Package Flashable Zip NONKSU
        run: |
          DATE=$(date +"%Y%m%d-%H%M")
          CONF_NAME="${{ github.event.inputs.localversion }}"
          ZIP_NAME="LandVe-${CONF_NAME}-NONKSU-${DATE}"

          IMAGE="kernel/out/arch/arm64/boot/Image.gz-dtb"
          mkdir -p output
          cp "$IMAGE" .github/Flash/kernels/

          cd .github/Flash/
          zip -r "../../output/${ZIP_NAME}.zip" ./*
          cd ../../

      - name: Calculate Metadata
