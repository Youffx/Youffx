name: LTO

on:
  workflow_dispatch:
    inputs:
      config_index:
        description: "Select (0,1,2,3,4)"
        required: true
        default: "0"
      localversion:
        description: "Youffx 2026"
        required: false
        default: ""

permissions:
  contents: write
  actions: read

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build-ksu:
    name: Build KSU
    runs-on: ubuntu-latest
    outputs:
      kern_ver: ${{ steps.kinfo.outputs.version }}
      commit_log: ${{ steps.kinfo.outputs.commit }}
      compiler_ver: ${{ steps.kinfo.outputs.compiler }}
      device_name: ${{ steps.cfg.outputs.name }}
      build_time: ${{ steps.calc.outputs.duration }}
      zip_hash: ${{ steps.calc.outputs.hash }}

    steps:
      - name: Start Timer
        id: start_timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex git gnupg gperf \
            libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev jq

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-ksu-${{ runner.os }}-${{ github.event.inputs.config_index }}-${{ github.run_id }}
          restore-keys: |
            ccache-ksu-${{ runner.os }}-${{ github.event.inputs.config_index }}-
            ccache-ksu-${{ runner.os }}-

      - name: Restore LLVM
        uses: actions/cache@v4
        with:
          path: llvm
          key: clang+llvm-17.0.6

      - name: Load Config
        id: cfg
        run: |
          CONFIG=$(jq -c ".[$CONFIG_INDEX]" configs/builds.json)
          NAME=$(echo "$CONFIG" | jq -r '.name')
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
        env:
          CONFIG_INDEX: ${{ github.event.inputs.config_index }}

      - name: Clone Kernel
        run: |
          REPO=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.repo')
          BRANCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.branch')
          DEPTH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.kernel.fetchDepth')

          git clone --depth=$DEPTH --branch $BRANCH $REPO kernel

      - name: Setup LLVM
        run: |
          if [ ! -d "llvm/bin" ]; then
            mkdir -p llvm
            curl -L https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz | tar -xJ -C llvm --strip-components=1
          fi
          echo "$PWD/llvm/bin" >> $GITHUB_PATH

      - name: Setup ccache
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -o base_dir=$GITHUB_WORKSPACE
          ccache -o hash_dir=false
          ccache -z

      - name: Prepare PGO Profile
        env:
          PGO_URL: ${{ secrets.PGO_FILE }}
        run: |
          curl -L -o vmlinux.profraw "$PGO_URL"
          $PWD/llvm/bin/llvm-profdata merge -o kernel/vmlinux.profdata vmlinux.profraw

      - name: Apply Root Method
        run: |
          ROOT_TYPE=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.type')

          if [ "$ROOT_TYPE" != "none" ]; then
            SETUP=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.setup')
            ARG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.arg')
            PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.manualPatch')
            EXTRA_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.extraPatch // empty')
            SUSFS_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.susfsPatch // empty')
            i_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iPatch // empty')
            ii_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iiPatch // empty')
            iii_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.iiiPatch // empty')
            iv_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.ivPatch // empty')
            v_PATCH=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '.root.vPatch // empty')

            cd kernel

            curl -LSs "$SETUP" | bash -s $ARG

            [ "$PATCH" != "null" ] && curl -LSs "$PATCH" | patch -p1 || true
            [ -n "$EXTRA_PATCH" ] && curl -LSs "$EXTRA_PATCH" | patch -p1 || true
            [ -n "$SUSFS_PATCH" ] && curl -LSs "$SUSFS_PATCH" | patch -p1 || true
            [ -n "$i_PATCH" ] && curl -LSs "$i_PATCH" | patch -p1 || true
            [ -n "$ii_PATCH" ] && curl -LSs "$ii_PATCH" | patch -p1 || true
            [ -n "$iii_PATCH" ] && curl -LSs "$iii_PATCH" | patch -p1 || true
            [ -n "$iv_PATCH" ] && curl -LSs "$iv_PATCH" | patch -p1 || true
            [ -n "$v_PATCH" ] && curl -LSs "$v_PATCH" | patch -p1 || true

            cd ..
          fi

      - name: Build Kernel KSU
        run: |
          DEFCONFIG=$(echo '${{ steps.cfg.outputs.config }}' | jq -r '."ksu-defconfig"')

          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$PWD/llvm/bin:$PATH"
          export KBUILD_BUILD_USER="youffx"
          export KBUILD_BUILD_HOST="collection"
          export KBUILD_BUILD_VERSION=1
          export KCONFIG_NOTIMESTAMP=1
          export KBUILD_BUILD_TIMESTAMP="Thu Jan 1 00:00:00 UTC 1970"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          export CC="ccache clang"
          export CXX="ccache clang++"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_MAXSIZE=10G

          ccache -s

          cd kernel
          make O=out $DEFCONFIG

          sed -i 's/.*CONFIG_STRICT_KERNEL_RWX.*/CONFIG_STRICT_KERNEL_RWX=n/' out/.config
          sed -i 's/.*CONFIG_STRICT_MODULE_RWX.*/CONFIG_STRICT_MODULE_RWX=n/' out/.config

          echo "CONFIG_STRICT_KERNEL_RWX=n" >> out/.config
          echo "CONFIG_STRICT_MODULE_RWX=n" >> out/.config

          LV_INPUT="${{ github.event.inputs.localversion }}"
          BASE="-LandVe"

          if [ -n "$LV_INPUT" ]; then
            LV="${BASE}${LV_INPUT}"
          else
            LV="$BASE"
          fi

          LV_ESCAPED=$(printf '%s\n' "$LV" | sed 's/[&#]/\\&/g')

          if grep -q "^CONFIG_LOCALVERSION=" out/.config; then
            sed -i "s#^CONFIG_LOCALVERSION=.*#CONFIG_LOCALVERSION=\"$LV_ESCAPED\"#" out/.config
          else
            echo "CONFIG_LOCALVERSION=\"$LV\"" >> out/.config
          fi

          make O=out olddefconfig

          echo "==============================================="
          echo "      CHECKING CRITICAL CONFIGURATIONS         "
          echo "==============================================="
          grep -E "CONFIG_PGO_CLANG|CONFIG_PGO_GEN|CONFIG_PGO_USE|CONFIG_RANDOMIZE_BASE|CONFIG_STRICT_KERNEL_RWX|CONFIG_STRICT_MODULE_RWX|CONFIG_DEBUG_FS" out/.config || true
          echo "==============================================="

          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC="ccache clang" \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-fprofile-use=$GITHUB_WORKSPACE/kernel/vmlinux.profdata -Wno-error=profile-instr-out-of-date" \
            KBUILD_LDFLAGS="--emit-relocs" \
            Image.gz-dtb 2>&1 | tee $GITHUB_WORKSPACE/build-ksu.log

      - name: Package Flashable Zip KSU
        run: |
          DATE=$(date +"%Y%m%d-%H%M")
          CONF_NAME="${{ github.event.inputs.localversion }}"
          ZIP_NAME="LandVe-${CONF_NAME}-KSU-${DATE}"

          IMAGE="kernel/out/arch/arm64/boot/Image.gz-dtb"
          mkdir -p output
          cp "$IMAGE" .github/Flash/kernels/

          cd .github/Flash/
          zip -r "../../output/${ZIP_NAME}.zip" ./*
          cd ../../

      - name: Calculate Metadata
        id: calc
        run: |
          END=$(date +%s)
          DIFF=$((END - ${{ steps.start_timer.outputs.start }}))
          MIN=$((DIFF / 60))
          SEC=$((DIFF % 60))
          echo "duration=${MIN}m ${SEC}s" >> $GITHUB_OUTPUT
          HASH=$(md5sum output/*.zip | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-ksu
          path: output/*.zip

      - name: Show ccache statistics
        run: ccache -s

      - name: Get Kernel Info
        id: kinfo
        run: |
          cd kernel
          echo "commit=$(git log -1 --format='%h %s')" >> $GITHUB_OUTPUT
          echo "version=$(make kernelversion)" >> $GITHUB_OUTPUT
          echo "compiler=$($GITHUB_WORKSPACE/llvm/bin/clang --version | head -n 1 | cut -d'(' -f1)" >> $GITHUB_OUTPUT

      - name: Telegram Fail Report
        if: failure()
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/build-ksu.log" ]; then
            ERROR_MSG="but there ain’t no logs tho.."
          else
            ERROR_MSG=$(grep -iE "error:|fatal:|make\[.*\]: \*\*\*" "$GITHUB_WORKSPACE/build-ksu.log" | tail -20)
          fi

          TEXT=$(cat <<EOF
          yoo build KSU flopped
          $ERROR_MSG
          EOF
          )

          curl -sX POST https://api.telegram.org/bot$TOKEN/sendMessage \
            -d chat_id="$CHATID" \
            --data-urlencode text="$TEXT"

  build-nonksu:
    name: Build NONKSU
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.calc.outputs.duration }}
      zip_hash: ${{ steps.calc.outputs.hash }}

    steps:
      - name: Start Timer
        id: start_timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
