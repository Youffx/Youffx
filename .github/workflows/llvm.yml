name: Upload LLVM

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git + Import GPG
        run: |
          git config --global user.name "${{ secrets.USER }}"
          git config --global user.email "${{ secrets.EMAIL }}"
          git config --global init.defaultBranch main

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf

          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --yes --import

          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

          # wrapper script
          cat > /tmp/gpg-wrapper.sh <<EOF
          #!/bin/bash
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" "\$@"
          EOF

          chmod +x /tmp/gpg-wrapper.sh
          git config --global gpg.program /tmp/gpg-wrapper.sh

      - name: Download LLVM
        run: |
          mkdir llvm-bin
          cd llvm-bin
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/LLVM-21.1.0-Linux-X64.tar.xz
          tar -xf LLVM-21.1.0-Linux-X64.tar.xz --strip-components=1
          rm *.xz

      - name: Commit + Push
        env:
          PAT_TOKEN: ${{ secrets.REPO_A_PAT }}
        run: |
          cd llvm-bin
          git init
          git add .
          git commit -m "Initial commit: Add LLVM 21.1.0 Official Binaries"
          git remote add origin https://x-access-token:${PAT_TOKEN}@github.com/Youffx/llvm-binaries.git
          git push -u origin main --force

      - name: Notification
        env:
          TOKEN: ${{ secrets.TG_TOKEN }}
          CHATID: ${{ secrets.TG_CHATID }}
        run: |
          tg() {
            curl -sX POST https://api.telegram.org/bot"${TOKEN}"/sendMessage \
              -d chat_id="${CHATID}" \
              -d parse_mode=Markdown \
              -d disable_web_page_preview=true \
              -d text="$1"
          }

          MESSAGE="*LLVM DONE*

          tg "$MESSAGE"
          
